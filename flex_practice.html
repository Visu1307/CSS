<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS Flex - Use it for 1D layouts</title>
    <style>
        .container{
            display: flex;
            flex-direction: column;
        }
        .navbar{
            background-color: red;
            color : white;
            text-align: center;
            border-radius: 20px;
            padding: 20px;
            font-size: xx-large;
        }
        .main{
            background-color: green;
            color: white;
            text-align: center;
            /* height: 100dvh; */
            border-radius: 20px;
            margin-top: 20px;
            font-size: xx-large;
        }
        .footer{
            background-color: blue;
            color: white;
            text-align: center;
            padding: 20px;
            border-radius: 20px;
            margin-top: 20px;
            font-size: xx-large;
        }
        .card-container{
            display: flex;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
            width: 100%;
        }
        .card{
            background-color: yellow;
            color: black;
            padding: 20px;
            border-radius: 20px;
            margin: 20px;
            flex-basis: 1;
            /* min-width: 200px; */
        }
    </style>
</head>
<body>
    <center>
        <h1>CSS Flexbox - Use it for 1D layouts</h1>
    </center>
    <div class="container">
        <div class="navbar">
            Navbar
        </div>
        <div class="main">
            Main Content    
            <div class="card-container">
                <div class="card">
                    Card - 1
                </div>        
                <div class="card">
                    Card - 2
                </div>        
                <div class="card">
                    Card - 3
                </div>        
                <div class="card">
                    Card - 4
                </div>        
                <div class="card">
                    Card - 5
                </div>        
                <div class="card">
                    Card - 6
                </div>        
            </div>
        </div>
        <div class="footer">
            Footer
        </div>
    </div>
</body>
</html>
